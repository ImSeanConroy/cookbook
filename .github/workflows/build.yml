name: Release - Build and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FRONTEND_IMAGE_NAME: imseanconroy/cookbook-frontend
  BACKEND_IMAGE_NAME: imseanconroy/cookbook-backend

jobs:
  frontend-checks:
    name: Frontend - Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  backend-checks:
    name: Backend - Lint and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests (Coverage)
        run: npm run test -- --coverage

  build-and-push-docker:
    name: Docker - Build and Push Images
    needs: [frontend-checks, backend-checks]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU for Multi-Architecture Builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=frontend-build
          cache-to: type=gha,mode=max,scope=frontend-build
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.ref_name }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=backend-build
          cache-to: type=gha,mode=max,scope=backend-build
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.BACKEND_IMAGE_NAME }}:${{ github.ref_name }}

  create-github-release:
    name: GitHub - Create Release
    needs: build-and-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh

      - name: Create GitHub Release
        run: |
          NOTES=$(awk "/## ${GITHUB_REF_NAME//v/}/ {flag=1; next} /^## / {flag=0} flag" CHANGELOG.md)

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "$NOTES" \
            --prerelease=false
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}