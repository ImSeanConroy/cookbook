name: Build and Release Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FRONTEND_IMAGE_NAME: imseanconroy/cookbook-frontend
  BACKEND_IMAGE_NAME: imseanconroy/cookbook-backend

jobs:
  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU for Multi-Architecture Builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.ref_name }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.BACKEND_IMAGE_NAME }}:${{ github.ref_name }}

  create-github-release:
    name: Create GitHub Release
    needs: build-and-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh

      - name: Create GitHub Release
        run: |
          NOTES=$(awk "/## ${GITHUB_REF_NAME//v/}/ {flag=1; next} /^## / {flag=0} flag" CHANGELOG.md)

          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "$NOTES" \
            --prerelease=false
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}